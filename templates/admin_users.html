{% extends "base.html" %}

{% block content %}
<h1>Пользователи</h1>

<style>
.common-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    table-layout: auto;
}
.common-table th,
.common-table td {
    padding: 16px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
}
.common-table th {
    background: rgba(30, 41, 59, 0.5);
    font-weight: 600;
    color: var(--text);
    position: sticky;
    top: 0;
}
.common-table tr:hover {
    background: rgba(30, 41, 59, 0.3);
}
.common-table .actions {
    width: 200px;
}
.common-table .btn {
    min-width: 96px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 13px;
    padding: 0 12px;
}
</style>

<table class="common-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Логин</th>
            <th>Роль</th>
            <th>Запрос</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user[0] }}</td>
            <td>{{ user[1] }}</td>
            <td>
                <select class="form-control" onchange="changeRole(this, {{ user[0] }})" style="width:120px;">
                    <option value="ученик" {% if user[2]=='ученик' %}selected{% endif %}>Ученик</option>
                    <option value="учитель" {% if user[2]=='учитель' %}selected{% endif %}>Учитель</option>
                    <option value="модератор" {% if user[2]=='модератор' %}selected{% endif %}>Модер</option>
                    <option value="администратор" {% if user[2]=='администратор' %}selected{% endif %}>Админ</option>
                </select>
            </td>
            <td>{{ user[3] or '—' }}</td>
            <td class="actions">
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-outline" onclick="showPasswordModal({{ user[0] }})">
                        <i>🔑</i> Пароль
                    </button>
                    <a href="{{ url_for('delete_user', user_id=user[0]) }}" class="btn btn-danger" onclick="return confirm('Удалить пользователя {{ user[1] }}?')">
                        <i>🗑️</i> Удалить
                    </a>
                </div>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<!-- Модалка изменения пароля -->
<div id="passwordModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:var(--surface); border-radius:12px; padding:24px; width:400px;">
        <h3>Изменить пароль</h3>
        <input type="hidden" id="edit_user_id">
        <div class="form-group">
            <label>Новый пароль</label>
            <input type="password" id="new_password_modal" class="form-control">
        </div>
        <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="btn btn-primary" onclick="savePassword()">Сохранить</button>
            <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<script>
function changeRole(select, userId) {
    const role = select.value;
    fetch('/admin/change_role/' + userId, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'new_role=' + encodeURIComponent(role)
    }).then(() => location.reload());
}

function showPasswordModal(userId) {
    document.getElementById('edit_user_id').value = userId;
    document.getElementById('passwordModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('passwordModal').style.display = 'none';
}

function savePassword() {
    const userId = document.getElementById('edit_user_id').value;
    const password = document.getElementById('new_password_modal').value;
    if (!password) {
        alert('Введите пароль');
        return;
    }
    fetch('/admin/change_password/' + userId, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'new_password=' + encodeURIComponent(password)
    }).then(() => {
        closeModal();
        alert('Пароль изменён');
        location.reload();
    });
}
</script>

<div style="margin-top: 32px;">
    <a href="{{ url_for('admin_panel') }}" class="btn btn-primary">
        <i>←</i> Назад
    </a>
</div>
{% endblock %}
