{% extends "base.html" %}

{% block content %}
<h1>Создать тест</h1>

<form method="POST" id="testForm">
    <div class="form-group">
        <label>Название</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="form-group">
        <label>Описание</label>
        <textarea name="description" class="form-control"></textarea>
    </div>

    <div class="form-group">
        <label>Макс. попыток</label>
        <select name="max_attempts" class="form-control">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="5">5</option>
        </select>
    </div>

    <!-- Блок вопросов -->
    <div id="questions-container">
        <!-- Шаблон вопроса (клонируется) -->
        <div class="question-card" style="
            background: var(--surface);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        ">
            <div class="form-group" style="margin-bottom: 16px;">
                <label>Вопрос</label>
                <input type="text" name="question_1" class="form-control" required placeholder="Введите вопрос">
            </div>

            <div class="answers-list">
                <!-- Ответ 1 -->
                <div class="answer-item" style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                    <input type="checkbox" name="correct_1_1" onchange="toggleCorrect(this, 1, 1)">
                    <input type="text" name="answer_1_1" class="form-control" placeholder="Ответ 1" required>
                    <span class="correct-badge" id="badge_1_1" style="
                        display: none;
                        background: rgba(16, 185, 129, 0.15);
                        color: var(--success);
                        padding: 4px 8px;
                        border-radius: 4px;
                        font-size: 12px;
                        white-space: nowrap;
                    ">✅ Правильный</span>
                </div>

                <!-- Ответ 2 -->
                <div class="answer-item" style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                    <input type="checkbox" name="correct_1_2" onchange="toggleCorrect(this, 1, 2)">
                    <input type="text" name="answer_1_2" class="form-control" placeholder="Ответ 2" required>
                    <span class="correct-badge" id="badge_1_2" style="
                        display: none;
                        background: rgba(16, 185, 129, 0.15);
                        color: var(--success);
                        padding: 4px 8px;
                        border-radius: 4px;
                        font-size: 12px;
                    ">✅ Правильный</span>
                </div>

                <!-- Ответ 3 -->
                <div class="answer-item" style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                    <input type="checkbox" name="correct_1_3" onchange="toggleCorrect(this, 1, 3)">
                    <input type="text" name="answer_1_3" class="form-control" placeholder="Ответ 3">
                    <span class="correct-badge" id="badge_1_3" style="
                        display: none;
                        background: rgba(16, 185, 129, 0.15);
                        color: var(--success);
                        padding: 4px 8px;
                        border-radius: 4px;
                        font-size: 12px;
                    ">✅ Правильный</span>
                </div>

                <!-- Ответ 4 -->
                <div class="answer-item" style="display: flex; align-items: center; gap: 12px;">
                    <input type="checkbox" name="correct_1_4" onchange="toggleCorrect(this, 1, 4)">
                    <input type="text" name="answer_1_4" class="form-control" placeholder="Ответ 4">
                    <span class="correct-badge" id="badge_1_4" style="
                        display: none;
                        background: rgba(16, 185, 129, 0.15);
                        color: var(--success);
                        padding: 4px 8px;
                        border-radius: 4px;
                        font-size: 12px;
                    ">✅ Правильный</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Кнопки действий -->
    <div style="display: flex; justify-content: space-between; margin-top: 32px;">
        <button type="button" class="btn btn-outline" onclick="addQuestion()">
            <i>+</i> Добавить вопрос
        </button>
        <button type="submit" class="btn btn-primary" style="min-width: 140px;">
            <i>✅</i> Создать тест
        </button>
    </div>
</form>

<script>
let questionCount = 1;

// Инициализируем первый вопрос
document.addEventListener('DOMContentLoaded', () => {
    setupQuestionEvents(1);
});

function setupQuestionEvents(qNum) {
    // Находим все чекбоксы в этом вопросе
    const checkboxes = document.querySelectorAll(`input[name^="correct_${qNum}_"]`);
    checkboxes.forEach((cb, idx) => {
        cb.addEventListener('change', function() {
            const answerNum = this.name.split('_')[2];
            const badge = this.closest('.answer-item').querySelector('.correct-badge');
            if (this.checked) {
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        });
    });
}

function addQuestion() {
    questionCount++;
    const container = document.getElementById('questions-container');

    const card = document.createElement('div');
    card.className = 'question-card';
    card.innerHTML = `
        <div class="form-group" style="margin-bottom: 16px;">
            <label>Вопрос ${questionCount}</label>
            <input type="text" name="question_${questionCount}" class="form-control" required placeholder="Введите вопрос">
        </div>
        <div class="answers-list">
            <div class="answer-item" style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                <input type="checkbox" name="correct_${questionCount}_1">
                <input type="text" name="answer_${questionCount}_1" class="form-control" placeholder="Ответ 1" required>
                <span class="correct-badge" style="
                    display: none;
                    background: rgba(16, 185, 129, 0.15);
                    color: var(--success);
                    padding: 4px 8px;
                    border-radius: 4px;
                    font-size: 12px;
                    white-space: nowrap;
                ">✅ Правильный</span>
            </div>
            <div class="answer-item" style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                <input type="checkbox" name="correct_${questionCount}_2">
                <input type="text" name="answer_${questionCount}_2" class="form-control" placeholder="Ответ 2" required>
                <span class="correct-badge" style="
                    display: none;
                    background: rgba(16, 185, 129, 0.15);
                    color: var(--success);
                    padding: 4px 8px;
                    border-radius: 4px;
                    font-size: 12px;
                ">✅ Правильный</span>
            </div>
            <div class="answer-item" style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                <input type="checkbox" name="correct_${questionCount}_3">
                <input type="text" name="answer_${questionCount}_3" class="form-control" placeholder="Ответ 3">
                <span class="correct-badge" style="
                    display: none;
                    background: rgba(16, 185, 129, 0.15);
                    color: var(--success);
                    padding: 4px 8px;
                    border-radius: 4px;
                    font-size: 12px;
                ">✅ Правильный</span>
            </div>
            <div class="answer-item" style="display: flex; align-items: center; gap: 12px;">
                <input type="checkbox" name="correct_${questionCount}_4">
                <input type="text" name="answer_${questionCount}_4" class="form-control" placeholder="Ответ 4">
                <span class="correct-badge" style="
                    display: none;
                    background: rgba(16, 185, 129, 0.15);
                    color: var(--success);
                    padding: 4px 8px;
                    border-radius: 4px;
                    font-size: 12px;
                ">✅ Правильный</span>
            </div>
        </div>
    `;

    container.appendChild(card);
    // Привязываем обработчики к новому вопросу
    setupQuestionEvents(questionCount);
}
</script>
{% endblock %}
